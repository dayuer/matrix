name: Deploy didi.bike

on:
  push:
    branches:
      - main
    paths:
      - 'apps/didi.bike/**'
      - 'docs/didi.bike-drafts/**'
      - 'scripts/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Monorepo Dependencies
        run: |
          npm install

      - name: Sync Articles to VPS A
        env:
          TARGET_SITE: didi.bike
          PB_URL: ${{ secrets.BIKE_PB_URL }}
          PB_IDENTITY: ${{ secrets.BIKE_PB_IDENTITY }}
          PB_PASSWORD: ${{ secrets.BIKE_PB_PASSWORD }}
        run: |
          node scripts/publish-articles.mjs

      - name: Build & Export didi.bike
        env:
          POCKETBASE_URL: ${{ secrets.BIKE_PB_URL }}
        run: |
          npm run build:platform
          npm run build -w @matrix/theme-didi
          cd apps/didi.bike
          npm run export

      - name: Deploy Static Web to VPS A
        uses: easingthemes/ssh-deploy@v5.0.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_A_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.VPS_A_HOST }}
          REMOTE_USER: 'root'
          SOURCE: "apps/didi.bike/out/"
          TARGET: "/var/www/didi.bike"
