# ============================================================
#  Nginx config for didi.bike static website
#  Path: /etc/nginx/sites-available/didi.bike
# ============================================================

# ---------- HTTP → HTTPS redirects ----------

server {
    listen 80;
    listen [::]:80;
    server_name didi.bike blog.didi.bike claw.didi.bike quanta.didi.bike;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS: didi.bike → Static Web ----------

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name didi.bike;

    ssl_certificate     /etc/letsencrypt/live/didi.bike/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/didi.bike/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:DIDI_SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Static site configuration (Replaced original PM2 node gateway)
    location = / {
        # Detect client language and redirect to /en or /id
        if ($http_accept_language ~* "^id") {
            return 302 /id;
        }
        return 302 /en;
    }

    location / {
        root /var/www/didi.bike;
        index index.html en.html;
        try_files $uri $uri.html $uri/ /en.html;
    }
}
