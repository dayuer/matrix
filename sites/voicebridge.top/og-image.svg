<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VoiceBridge — Free, 100% offline voice-to-text and AI meeting notes">
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7d6cf0"/>
      <stop offset="1" stop-color="#5847c8"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f5f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- brand mark -->
  <g transform="translate(96 92)">
    <rect width="88" height="88" rx="20" fill="url(#mark)"/>
    <g fill="#fff">
      <rect x="20" y="37" width="7" height="15" rx="3.5"/>
      <rect x="33" y="27" width="7" height="35" rx="3.5"/>
      <rect x="46" y="18" width="7" height="52" rx="3.5"/>
      <rect x="59" y="32" width="7" height="24" rx="3.5"/>
    </g>
  </g>
  <text x="204" y="138" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#1d1d1f" letter-spacing="-1.2">VoiceBridge</text>
  <text x="206" y="172" font-family="-apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="23" font-weight="500" fill="#86868b" letter-spacing="0.5">On-device transcription</text>

  <!-- headline -->
  <text x="94" y="318" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="76" font-weight="700" fill="#1d1d1f" letter-spacing="-2.5">Turn recordings into</text>
  <text x="94" y="404" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="76" font-weight="700" fill="#1d1d1f" letter-spacing="-2.5">meeting notes.</text>

  <!-- subhead -->
  <text x="96" y="466" font-family="-apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="400" fill="#6e6e73">Speaker separation · AI notes · PDF export — all on device.</text>

  <!-- pills -->
  <g font-family="-apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="600">
    <rect x="96" y="516" width="188" height="60" rx="30" fill="#6c5ce7"/>
    <text x="190" y="555" text-anchor="middle" fill="#ffffff">$0 · Free</text>
    <rect x="300" y="516" width="212" height="60" rx="30" fill="#eceaff"/>
    <text x="406" y="555" text-anchor="middle" fill="#5847c8">100% offline</text>
    <rect x="528" y="516" width="230" height="60" rx="30" fill="#eceaff"/>
    <text x="643" y="555" text-anchor="middle" fill="#5847c8">Never uploaded</text>
  </g>

  <!-- waveform accent -->
  <g fill="#6c5ce7" transform="translate(840 250)">
    <rect x="0"   y="60" width="16" height="80"  rx="8"/>
    <rect x="34"  y="20" width="16" height="160" rx="8"/>
    <rect x="68"  y="-20" width="16" height="240" rx="8"/>
    <rect x="102" y="30" width="16" height="140" rx="8"/>
    <rect x="136" y="70" width="16" height="60"  rx="8"/>
    <rect x="170" y="10" width="16" height="180" rx="8"/>
    <rect x="204" y="55" width="16" height="90"  rx="8"/>
  </g>
</svg>
