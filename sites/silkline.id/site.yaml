# silkline.id — 立足印尼的企业数字基础设施平台，双语（EN/ID）
theme: arrfunds
lang: en
themeOptions:
  tokens:
    # 品牌主色：深石板（仅 footer/深色区）
    '--primary': '#1e293b'
    '--primary-light': '#334155'
    '--primary-dark': '#0f172a'
    '--primary-rgb': '30, 41, 59'
    '--primary-dark-rgb': '15, 23, 42'
    # 强调色：天空蓝
    '--accent': '#0ea5e9'
    '--accent-rgb': '14, 165, 233'
    # 文字
    '--text-dark': '#0f172a'
    '--text-dark-rgb': '15, 23, 42'
    '--text-muted': '#64748b'
    '--text-light': '#f8fafc'
    '--text-muted-light': 'rgba(255, 255, 255, 0.6)'
    # 背景与表面：清爽浅色
    '--bg-light': '#f8fafc'
    '--bg-gray': '#f1f5f9'
    '--bg-light-sec': '#f1f5f9'
    '--bg-dark-sec': '#0f172a'
    '--surface': '#ffffff'
    '--border-color': 'rgba(14, 165, 233, 0.10)'
    # 导航
    '--nav-text': '#1e293b'
    '--nav-bg-scrolled': 'rgba(248, 250, 252, 0.88)'
    '--nav-border-scrolled': 'rgba(14, 165, 233, 0.08)'
    '--nav-logo-scrolled': '#0f172a'

baseUrl: https://silkline.id
brand:
  name: SilkLine.AI
  desc: Enterprise digital infrastructure for Indonesia.
  favicon: /images/favicon.svg

nav:
  - { key: en, text: EN, href: "/" }
  - { key: id, text: ID, href: "/id/" }
cta: { text: Contact Us, href: "mailto:hello@silkline.id" }

footer:
  columns:
    - title: Connect
      links:
        - { text: hello@silkline.id, href: "mailto:hello@silkline.id" }
        - { text: Jakarta, href: "#" }
        - { text: Singapore, href: "#" }
  legal:
    contact: hello@silkline.id
    company: { text: PT SilkLine Digital Indonesia, href: "#" }
    foundingYear: 2024
  social:
    - { text: LinkedIn, href: "#" }
    - { text: Twitter, href: "#" }

defaults:
  ogImage: /images/og-image.svg
