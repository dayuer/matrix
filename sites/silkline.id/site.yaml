# silkline.id — 立足印尼的企业数字基础设施平台，双语（EN/ID）
theme: arrfunds
lang: en
themeOptions:
  tokens:
    '--primary': '#0a0e1a'
    '--primary-light': '#131933'
    '--primary-dark': '#050810'
    '--primary-rgb': '10, 14, 26'
    '--primary-dark-rgb': '5, 8, 16'
    '--accent': '#3b82f6'
    '--accent-rgb': '59, 130, 246'
    '--text-dark': '#e2e8f0'
    '--text-dark-rgb': '226, 232, 240'
    '--text-muted': '#94a3b8'
    '--text-light': '#f8fafc'
    '--text-muted-light': 'rgba(255, 255, 255, 0.55)'
    '--bg-light': '#0a0e1a'
    '--bg-gray': '#111827'
    '--bg-light-sec': '#0f1629'
    '--bg-dark-sec': '#060a14'
    '--surface': 'rgba(30, 41, 59, 0.6)'
    '--border-color': 'rgba(59, 130, 246, 0.12)'
    '--nav-text': '#e2e8f0'
    '--nav-bg-scrolled': 'rgba(10, 14, 26, 0.85)'
    '--nav-border-scrolled': 'rgba(59, 130, 246, 0.1)'

baseUrl: https://silkline.id
brand:
  name: SilkLine
  desc: Enterprise digital infrastructure for Indonesia.
  favicon: /images/favicon.svg

nav: []
cta: { text: Contact Us, href: "mailto:hello@silkline.id" }

footer:
  columns:
    - title: Connect
      links:
        - { text: hello@silkline.id, href: "mailto:hello@silkline.id" }
        - { text: Jakarta, href: "#" }
        - { text: Singapore, href: "#" }
  legal:
    contact: hello@silkline.id
    company: { text: PT SilkLine Digital Indonesia, href: "#" }
    foundingYear: 2024
  social:
    - { text: LinkedIn, href: "#" }
    - { text: Twitter, href: "#" }

defaults:
  ogImage: /images/og-image.svg
