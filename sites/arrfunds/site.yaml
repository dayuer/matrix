# arrfunds.com —— 站点品牌级配置（纯数据，由 matrix CLI 驱动）
theme: arrfunds
# 站点色系（模板 theme.css 只认 token，这里是 arrfunds 绿色系的唯一定义处）
themeOptions:
  tokens:
    # 品牌主色：深邃金融绿
    '--primary': '#0a3622'
    '--primary-light': '#1c5239'
    '--primary-dark': '#051a12'
    '--primary-rgb': '10, 54, 34'
    '--primary-dark-rgb': '5, 26, 18'
    # 强调色：科技青绿
    '--accent': '#00bfa6'
    '--accent-rgb': '0, 191, 166'
    # 文字
    '--text-dark': '#1d1d1f'
    '--text-dark-rgb': '29, 29, 31'
    '--text-muted': '#515154'
    '--text-light': '#f5f5f7'
    '--text-muted-light': 'rgba(255, 255, 255, 0.7)'
    # 背景与表面
    '--bg-light': '#051a12'
    '--bg-gray': '#f4f7f6'
    '--bg-light-sec': '#f2f6f4'
    '--bg-dark-sec': '#082117'
    '--surface': '#ffffff'
    '--border-color': 'rgba(10, 54, 34, 0.08)'

baseUrl: https://arrfunds.com

brand:
  name: ARR Funds
  desc: 专注投资拥有经常性收入（ARR）的 AI 企业。我们寻找将人工智能转化为可持续订阅收入的优秀团队，提供资本、资源与战略支持。
  favicon: /images/favicon.ico

nav:
  - { key: home, text: 首页, href: / }
  - { key: thesis, text: 投资理念, href: "/#thesis" }
  - { key: portfolio, text: 关注领域, href: "/#portfolio" }
  - { key: process, text: 投资流程, href: "/#process" }

cta: { text: 提交 BP, href: "/#apply" }

footer:
  columns:
    - title: 投资方向
      links:
        - { text: AI SaaS 企业服务, href: "/#portfolio" }
        - { text: AI 基础设施与工具链, href: "/#portfolio" }
        - { text: AI 垂直行业应用, href: "/#portfolio" }
    - title: 关于基金
      links:
        - { text: 投资理念, href: "/#thesis" }
        - { text: 投资流程, href: "/#process" }
        - { text: 联系我们, href: "/#apply" }
    - title: 法律条款
      links:
        - { text: 隐私政策, href: / }
        - { text: 免责声明, href: / }
  legal:
    contact: BP 投递 & 投资合作：contact@arrfunds.com
    company: { text: ARR Funds Management Limited, href: "#" }
    foundingYear: 2024
  social:
    - { text: LinkedIn, href: "#" }
    - { text: Twitter, href: "#" }

defaults:
  ogImage: /images/og-image.jpg
