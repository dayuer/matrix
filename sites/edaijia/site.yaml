analytics:
  provider: none
  id: ''
defaults:
  ogImage: /images/bento-service-driver.png
collections:
  - name: blog
    from: ../../docs/edaijia-drafts
    exclude:
      - sample-article
      - redundancy_report
    authorsDir: ../../config/authors
    groupBy: cluster
    relatedLimit: 3
    authorDefault:
      bio: e代驾安全合规与智能算法研究运营团队
    authorOverrides:
      analyst:
        name: 王建国
        bio: e代驾资深运营数据分析师，专注于代驾定价模型、供需平衡算法与出行热力分析。
      journalist:
        name: 李明
        bio: e代驾安全合规运营专家，长期深耕代驾保险理赔政策、交通安全法规与责任划分规则。
      pm:
        name: 陈经理
        bio: e代驾企业服务（B2B）产品线负责人，致力于二手车商及金融机构车辆履约效率提升。
      academic:
        name: 张华
        bio: e代驾司机运营及服务质量研究员，长期从事代驾司机准入培训、实操路考与服务标准规范设计。
    list:
      path: /blog
      template: blogList
      localsKey: articles
      meta:
        title: 代驾行业资讯与前沿洞察 | e代驾 — 您的车，放心交给我们
        description: e代驾行业洞察频道：聚焦代驾出行行业动态、车险增值服务标准化、智能驾驶人机协同及车辆履约等前沿深度研究与指南。
        activeNav: blog
        bodyClass: subpage
    detail:
      pathPrefix: /blog
      template: blogDetail
      localsKey: article
      relatedKey: relatedArticles
      titleSuffix: ' | e代驾 — 您的车，放心交给我们'
      meta:
        activeNav: blog
        bodyClass: subpage
