# ============================================================
#  Nginx config for busae.ai static website
#  Path: /etc/nginx/sites-available/busae.ai
#  缓存策略：HTML no-cache（ETag 304，发版即时生效）；
#  静态资源带 ?v= 版本号，可放心 365d immutable。
# ============================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2 ipv6only=on;
    server_name busae.ai www.busae.ai;

    ssl_certificate /etc/letsencrypt/live/busae.ai/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/busae.ai/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    root /var/www/busae.ai;
    index index.html;
    error_page 404 /404.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 版本化静态资源（css/js/图片/字体）：一年不可变缓存
    location ~* \.(css|js|mjs|svg|ico|jpg|jpeg|png|gif|webp|avif|woff2?|ttf|otf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # sitemap / robots：每日回源
    location ~* \.(xml|txt)$ {
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # HTML：每次协商（ETag → 304），部署后立即生效
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name busae.ai www.busae.ai;
    return 301 https://$host$request_uri;
}
