locals:
  faq:
    - q: e代驾服务开通城市都有哪些？
      a: e代驾目前已开通北京、上海、广州、深圳、成都、杭州、武汉、西安、南京、重庆等全国近400个城市。具体服务覆盖范围及开通区域，您可直接登录e代驾APP或小程序进行实时定位查询。
    - q: e代驾手机客户端都支持哪些手机系统？
      a: 目前e代驾手机客户端全面支持苹果（iOS）和安卓（Android）操作系统，适配各种主流智能手机机型。
    - q: e代驾手机客户端在哪里可以下载？
      a: 您可以通过以下方式便捷下载：<br>• 扫描本网页底部的官方二维码，进行极速一键安装；<br>• 在苹果 App Store 或各大安卓应用商店搜索“e代驾”直接下载；<br>• 在手机浏览器中直接访问官方下载页面：wap.edaijia.cn。
    - q: e代驾如何收费？
      a: 代驾服务采取“起步价 + 超里程费”的计费模式，不同时段、不同城市及不同服务类型的收费标准存在差异。具体的收费明细及各城市价格，请您在e代驾APP或小程序首页的“服务城市及价格”公示中进行详细查看。
    - q: 哪些情况不属于e代驾服务范畴？
      a: 为保障代驾安全与合法合规，以下情况暂不提供代驾服务：<br>军车、无牌照车辆、境外车、外地进京无进京证车辆、肇事逃逸车辆、车内有违禁品车辆、临时牌照车辆、无保险车辆、客户处于醉酒状态且无旁人陪伴、营运车辆、车辆手续不全、非法改装车辆、以及政府职能车辆等。
    - q: 代驾司机在代驾过程中出现交通违规，该如何处理？
      a: 在确认由代驾司机操作造成的交通违章后，e代驾会负责为您处理。当您收到交通违章通知后，请登录e代驾APP或小程序，点击左上角菜单，进入【客服中心】- 联系在线客服，并上传违章通知的截图，小e会为您及时对接并全程协助处理。
    - q: 订单发票如何开具？
      a: e代驾支持开具增值税电子普通发票，开票内容为：*信息技术服务*代驾信息服务费。您可以使用下单手机号登录e代驾APP或小程序，在左上角选项卡中进入【账户】/【我的账户】-【申请发票】-【代驾发票申请】填写您的开票信息即可。推荐申请电子发票，开具时效更快。
    - q: 呼叫代驾后，代驾师傅多久能到达指定地点？
      a: 得益于我们强大的派单系统与高密度的司机分布，在大部分主要城区，司机的平均到达时间约为5分钟。如遇恶劣天气、交通拥堵或下单位置较偏远，到达时间可能稍有延长，建议您通过APP查看司机的实时定位并直接与师傅沟通确认。
    - q: 客户临时取消代驾，是否可以收取费用？
      a: 在司机接单后，下单页面会实时提示“免费取消时限”。若您在此免费取消时间之后无责取消，不会收取任何费用；若超时取消或由于您行程改变等原因导致有责取消，可能需支付一定数额的消单费。另外，如果代驾司机已到达并在原地等候超时，需按标准加收相应的等候费。
    - q: 司机在何种条件下可以向客户索要打车费用？
      a: 判断标准以客户是否主动要求为准：若客户在叫车时主动要求代驾司机打车以加快到达出发地，则该打车费用需由客户承担，并按实际费用支付给代驾司机；若客户未提出打车要求，司机不得以任何理由向客户索要或加收打车费用。
