  ogImageAlt: e代驾专业代驾司机
  jsonLd:
    "@context": https://schema.org
    "@type": Organization
    name: e代驾
    legalName: 北京亿心宜行汽车技术开发服务有限公司
    url: https://www.edaijia.cn/
    logo: https://www.edaijia.cn/images/logo.png
    image: https://www.edaijia.cn/images/bento-service-driver.png
    description: e代驾提供酒后代驾、跨城送车、代保养代检车等服务，覆盖全国 300+ 城市，实惠更安全，代驾行业国家标准主笔单位。
    foundingDate: "2011"
    slogan: 您的车，放心交给我们
    areaServed: CN
    contactPoint:
      - "@type": ContactPoint
        telephone: "95139"
        contactType: customer service
        areaServed: CN
        availableLanguage: zh-CN
    sameAs:
      - https://weibo.com/edaijia

blocks:
  - type: hero
    data:
      eyebrow: 实惠更安全 · 覆盖全国 300+ 城市
      titleHtml: 您的车，<br>放心交给我们。
      subtitle: 喝了酒，我们送您和车安全到家；车要跨省，我们替您提车送到门；没空保养，我们帮您全程打理。
      links:
        - { text: 立即下载 App, href: "#download", track: download_click, trackPlatform: hero }
        - { text: 了解我们的服务, href: "#services" }
      qr:
        img: /images/qr-download.png
        alt: 下载 App 二维码
        title: 扫码一键叫代驾
        subtitle: 支持 iOS & Android

  - type: bento-grid
    data:
      id: services
      header:
        label: 核心服务
        titleHtml: 总有一种，<br>刚好适合你的车。
        desc: 三张服务网络，一份省心托付——全天候、全场景，始终更安全。
      cards:
        - variant: featured
          title: 酒后代驾
          desc: 到达快、服务好、价格低、保障全。国家标准主笔单位，安全呼叫一键即达。
          links:
            - { text: 扫码下载 App 叫车, href: "#download", track: download_click, trackPlatform: bento }
          img: { src: /images/bento-service-driver.png, alt: 专业代驾司机 }
        - variant: standard
          title: 车管家
          desc: 您的私人用车管家。代保养、代检车、机场接送、爱车托管，其余交给我们。
          links:
            - { text: 了解车管家服务, href: "#download" }
          img: { src: /images/bento-car-butler.png, alt: 车管家专业保养 }
        - variant: flat
          tag: 企业级服务 / B2B
          title: 车辆履约
          desc: 二手车异地流通的可信代理。提供跨省代提车、代送到门、过户陪跑——一口价、全程可追踪。
          links:
            - { text: 商务合作咨询, href: /serves }
            - { text: 企业 VIP 办理, href: "https://www.edaijia.cn/vip.html", external: true, track: outbound_click }
          img: { src: /images/bento-car-delivery.png, alt: 跨省车辆运送 }

  - type: stats
    data:
      id: trust
      header:
        label: 值得信赖
        titleHtml: '<span id="trustYears">十五</span>年，把信任做厚。'
        desc: 从国家标准到 AI 安全体系，每一步都在加深信任。
      items:
        - { counter: { target: 300 }, suffix: "+", label: 服务城市覆盖 }
        - { counter: { founding: 2011 }, suffix: 年+, label: 行业深耕 }
        - { text: 国家标准, label: 代驾行业标准主笔单位 }
        - { text: AI 护航, label: 车况核验 · 路线监测 }

  - type: timeline
    data:
      id: timeline
      header:
        label: 发展历程
        titleHtml: 安全这件事，我们坚持了<span id="timelineYears">十五</span>年。
        desc: 每一次产品迭代，都在让您的出行更安心一点。
      items:
        - { year: 2011, text: 在北京成立，用 LBS 定位取代呼叫中心，开创互联网代驾。 }
        - { year: 2015, text: 首推代驾责任险，最高赔付 1000 万。首创司机人身意外险。 }
        - { year: 2016, text: 覆盖全国 300+ 城市。上线人脸识别，实现「人证合一」。 }
        - { year: 2019, text: 主笔确立代驾行业国家标准。入驻微信九宫格出行服务。 }
        - { year: 2021, text: 发布首个代驾安全团体标准。AI 派单上线，平均 5 分钟接驾。 }
        - { year: 2023, text: 品牌升级「实惠更安全」。构建全链路数字化安全闭环。 }
        - { year: 2024, text: 入驻京东、抖音，全渠道覆盖。服务延伸至代保养、代年检。 }
        - { year: 未来, text: 安全不是终点，而是对每一位车主的承诺。, accent: true }

